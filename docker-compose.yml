version: "3.9"

# ============================================================
# Wolverine – docker-compose.yml
# ============================================================
# Build and run Wolverine locally with persistence and full browser support.
#
# Usage:
#   docker-compose up -d
# ============================================================

services:
  wolverine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wolverine-app
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18789}:18789"

    # Allows container to reach Ollama/LMStudio on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Persistent config, database, and logs
      - wolverine_config:/app/.wolverine

      # Agent workspace: where memory (SOUL.md) and identity files live.
      # Mount your local workspace folder here to preserve agent context.
      - ./workspace:/app/workspace

    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=18789
      - WOLVERINE_DATA_DIR=/app/.wolverine
      - WOLVERINE_WORKSPACE_DIR=/app/workspace

      # LLM Provider Configuration
      # Default: Point to Ollama running on the host machine
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - WOLVERINE_PROVIDER=${WOLVERINE_PROVIDER:-ollama}

      # Other Providers (Fallback/Configurable via .env)
      - LM_STUDIO_ENDPOINT=${LM_STUDIO_ENDPOINT:-http://host.docker.internal:1234}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:18789/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  wolverine_config:
    driver: local
