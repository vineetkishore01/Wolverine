<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolverine | Mission Control</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #111111;
            --panel-light: #1a1a1a;
            --accent: #ffffff;
            --text: #ffffff;
            --dim: #666666;
            --border: #222222;
            --success: #00ff9d;
            --info: #00d4ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #onboarding {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .onboarding-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        .onboarding-card h1 { font-size: 28px; margin-bottom: 8px; }
        .onboarding-card p { color: var(--dim); margin-bottom: 30px; }
        .onboarding-card h2 { font-size: 12px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
        .onboarding-card input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .onboarding-card button {
            width: 100%;
            background: var(--success);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }
        .onboarding-card button:hover { opacity: 0.9; }
        #sidebar {
            width: 70px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
        }
        .nav-item {
            cursor: pointer;
            color: var(--dim);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            text-transform: uppercase;
            padding: 8px;
        }
        .nav-item:hover, .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; }
        #main { flex: 1; display: flex; flex-direction: column; }
        header {
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            background: var(--panel);
        }
        .logo { font-weight: 700; font-size: 16px; }
        .logo span { font-weight: 300; opacity: 0.5; }
        .status-badge {
            font-size: 10px;
            background: #000;
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
        .dot.offline { background: #ff4757; }
        .tab-content { display: none; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; flex-direction: column; }
        #chat { padding: 0; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: var(--accent); color: #000; }
        .msg.wolverine { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
        .msg.wolverine.thinking { opacity: 0.6; font-style: italic; }
        .msg-time { font-size: 9px; color: var(--dim); margin-top: 4px; }
        #chat-input-area { padding: 12px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #chat-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 16px; border-radius: 24px; font-size: 14px; font-family: inherit; }
        #chat-input:focus { outline: none; }
        #send-btn { width: 40px; height: 40px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #send-btn svg { width: 16px; height: 16px; fill: #000; }
        #activity { padding: 20px; overflow-y: auto; }
        #feed { display: flex; flex-direction: column; gap: 10px; max-width: 800px; margin: 0 auto; width: 100%; }
        .event { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
        .event-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 6px; font-family: monospace; }
        .event-content { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
        .event.thought { border-left: 3px solid var(--info); }
        .event.action { border-left: 3px solid var(--success); }
        .event.system { border-left: 3px solid var(--accent); }
        #settings { padding: 20px; overflow-y: auto; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 12px; margin-bottom: 16px; }
        .card label { display: block; font-size: 10px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; }
        .card input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
        .card input:focus { outline: none; border-color: var(--success); }
        .card button { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; margin-right: 8px; }
        .card button:hover { opacity: 0.85; }
        .card button.secondary { background: var(--panel-light); color: var(--accent); border: 1px solid var(--border); }
        #hot-reload {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--success); color: #000; padding: 8px 16px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            opacity: 0; transform: translateY(20px); transition: 0.3s;
        }
        #hot-reload.show { opacity: 1; transform: translateY(0); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="onboarding">
        <div class="onboarding-card">
            <h1>Welcome to Wolverine</h1>
            <p>Configure your AI agent's brain to get started.</p>
            <h2>Brain (Ollama)</h2>
            <input type="text" id="cfg-ollama-url" placeholder="http://192.168.0.62:11434">
            <input type="text" id="cfg-ollama-model" placeholder="qwen3.5:4b">
            <h2>Memory (Chetna)</h2>
            <input type="text" id="cfg-chetna-url" placeholder="http://127.0.0.1:1987">
            <h2>Telegram (Optional)</h2>
            <input type="text" id="cfg-telegram-token" placeholder="Bot Token">
            <button onclick="completeOnboarding()">Initialize Wolverine</button>
        </div>
    </div>

    <nav id="sidebar">
        <div class="nav-item active" onclick="showTab('chat')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chat
        </div>
        <div class="nav-item" onclick="showTab('activity')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Activity
        </div>
        <div class="nav-item" onclick="showTab('memory')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg>
            Memory
        </div>
        <div class="nav-item" onclick="showTab('settings')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Tweak
        </div>
    </nav>

    <div id="main">
        <header>
            <div class="logo">WOLVERINE <span>MISSION CONTROL</span></div>
            <div class="status-badge">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">CONNECTING...</span>
            </div>
        </header>

        <div id="chat" class="tab-content active">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask Wolverine anything..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>
        </div>

        <div id="activity" class="tab-content">
            <div id="feed"></div>
        </div>

        <div id="memory" class="tab-content">
            <div style="padding: 20px;">
                <input type="text" id="memory-search" placeholder="Search long-term memory..." oninput="debounceSearch(this.value)" style="background:#000;border:1px solid #222;color:#fff;padding:12px;border-radius:8px;width:100%;font-size:14px;margin-bottom:16px;">
                <div id="memory-results"></div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="settings-grid">
                <div class="card">
                    <h3>Brain (Ollama)</h3>
                    <label>Server URL</label>
                    <input type="text" id="s-ollama-url">
                    <label>Model</label>
                    <input type="text" id="s-ollama-model">
                    <button onclick="saveConfig()">Save & Hot-Reload</button>
                </div>
                <div class="card">
                    <h3>Telegram</h3>
                    <label>Bot Token</label>
                    <input type="password" id="s-telegram-token">
                    <button onclick="clearMemory()" class="secondary">Clear All Memory</button>
                </div>
                <div class="card">
                    <h3>Memory (Chetna)</h3>
                    <label>Chetna URL</label>
                    <input type="text" id="s-chetna-url">
                </div>
            </div>
        </div>
    </div>

    <div id="hot-reload">Saved!</div>

    <script>
        let ws = null;
        let requestId = 0;
        let config = {};

        async function completeOnboarding() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = "Initializing...";
            
            const settings = {
                gateway: { port: 18789, host: "0.0.0.0" },
                llm: { defaultProvider: "ollama", ollama: { url: document.getElementById("cfg-ollama-url").value, model: document.getElementById("cfg-ollama-model").value } },
                telegram: { botToken: document.getElementById("cfg-telegram-token").value, allowedUserIds: [] },
                brain: { chetnaUrl: document.getElementById("cfg-chetna-url").value }
            };

            try {
                await fetch("/api/onboarding", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(settings) });
                document.getElementById("onboarding").style.display = "none";
                config = settings;
                connectWS();
            } catch (e) {
                btn.disabled = false;
                btn.textContent = "Initialize Wolverine";
                alert("Error: " + e);
            }
        }

        function connectWS() {
            ws = new WebSocket(`ws://${location.host}`);

            ws.onopen = () => {
                updateStatus("CONNECTED", false);
                ws.send(JSON.stringify({ type: "req", id: "init", method: "connect", params: { nodeId: "web-ui", capabilities: ["chat", "telemetry"], displayName: "Web Dashboard" } }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === "event") {
                    addEventToFeed(data.payload);
                } else if (data.type === "res" && data.payload?.content) {
                    addWolverineMessage(data.payload.content);
                }
            };

            ws.onclose = () => {
                updateStatus("RECONNECTING...", true);
                setTimeout(connectWS, 2000);
            };

            ws.onerror = () => updateStatus("ERROR", true);
        }

        function updateStatus(text, offline) {
            document.getElementById("status-text").textContent = text;
            const dot = document.getElementById("status-dot");
            if (offline) dot.classList.add("offline");
            else dot.classList.remove("offline");
        }

        function sendMessage() {
            const input = document.getElementById("chat-input");
            const text = input.value.trim();
            if (!text || !ws) return;

            addUserMessage(text);
            input.value = "";
            addWolverineMessage("Thinking...", true);

            ws.send(JSON.stringify({ type: "req", id: `msg-${++requestId}`, method: "agent.chat", params: { messages: [{ role: "user", content: text }] } }));
        }

        function addUserMessage(text) {
            const msgs = document.getElementById("chat-messages");
            const el = document.createElement("div");
            el.className = "msg user";
            el.innerHTML = `<div>${escapeHtml(text)}</div><div class="msg-time">${new Date().toLocaleTimeString()}</div>`;
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addWolverineMessage(text, thinking = false) {
            const msgs = document.getElementById("chat-messages");
            let el = msgs.querySelector(".msg.wolverine.thinking");
            if (!el) {
                el = document.createElement("div");
                el.className = "msg wolverine" + (thinking ? " thinking" : "");
                msgs.appendChild(el);
            }
            el.className = "msg wolverine" + (thinking ? " thinking" : "");
            el.innerHTML = `<div>${escapeHtml(text)}</div><div class="msg-time">${new Date().toLocaleTimeString()}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addEventToFeed(event) {
            const container = document.getElementById("feed");
            const el = document.createElement("div");
            el.className = `event ${event.type}`;
            el.innerHTML = `<div class="event-header"><span>${new Date(event.timestamp).toLocaleTimeString()} | ${event.source}</span><span>${event.type}</span></div><div class="event-content">${escapeHtml(typeof event.content === "string" ? event.content : JSON.stringify(event.content))}</div>`;
            container.prepend(el);
            if (container.childNodes.length > 50) container.lastChild.remove();
        }

        async function loadConfig() {
            try {
                const res = await fetch("/api/config");
                config = await res.json();
                document.getElementById("s-ollama-url").value = config.llm?.ollama?.url || "";
                document.getElementById("s-ollama-model").value = config.llm?.ollama?.model || "";
                document.getElementById("s-telegram-token").value = config.telegram?.botToken || "";
                document.getElementById("s-chetna-url").value = config.brain?.chetnaUrl || "";
            } catch (e) { console.error("Failed to load config:", e); }
        }

        async function saveConfig() {
            config.llm = { defaultProvider: "ollama", ollama: { url: document.getElementById("s-ollama-url").value, model: document.getElementById("s-ollama-model").value } };
            config.telegram = { botToken: document.getElementById("s-telegram-token").value, allowedUserIds: [] };
            config.brain = { chetnaUrl: document.getElementById("s-chetna-url").value };

            await fetch("/api/config", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(config) });
            showHotReload();
        }

        async function clearMemory() {
            if (confirm("Clear all memory?")) {
                await fetch("/api/memory/clear", { method: "DELETE" });
                document.getElementById("memory-results").innerHTML = "";
                showHotReload();
            }
        }

        let searchTimeout;
        function debounceSearch(q) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchMemory(q), 300);
        }

        async function searchMemory(q) {
            if (q.length < 2) return;
            const res = await fetch(`/api/memory?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            const container = document.getElementById("memory-results");
            container.innerHTML = "";
            (data.memories || []).forEach(m => {
                const el = document.createElement("div");
                el.className = "event";
                el.innerHTML = `<div class="event-content">${escapeHtml(m.content || JSON.stringify(m))}</div>`;
                container.appendChild(el);
            });
        }

        function showTab(id) {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(t => t.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            event.currentTarget.classList.add("active");
            if (id === "settings") loadConfig();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function showHotReload() {
            const el = document.getElementById("hot-reload");
            el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 2000);
        }

        async function init() {
            try {
                const res = await fetch("/api/config");
                config = await res.json();
                
                if (config.llm?.ollama?.url) {
                    document.getElementById("onboarding").style.display = "none";
                    connectWS();
                } else {
                    document.getElementById("onboarding").style.display = "flex";
                    document.getElementById("cfg-ollama-url").value = "http://192.168.0.62:11434";
                    document.getElementById("cfg-ollama-model").value = "qwen3.5:4b";
                    document.getElementById("cfg-chetna-url").value = "http://127.0.0.1:1987";
                }
            } catch (e) {
                document.getElementById("onboarding").style.display = "flex";
            }
        }
        
        init();
    </script>
</body>
</html>
